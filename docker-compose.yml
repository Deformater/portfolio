version: "3"
services:
  client:
    image: nginx
    restart: always
    container_name: gribok-portfolio
    volumes:
      - ./src:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8765:80"
      - "8766:443"
networks:
  default:
    external: true
    name: npm_net
